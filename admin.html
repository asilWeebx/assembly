<!DOCTYPE html>
<html class="dark" lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Админ-панель | Economic Assembly</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              background: "var(--background)",
              "on-background": "var(--on-background)",
              surface: "var(--surface)",
              "on-surface": "var(--on-surface)",
              "surface-variant": "var(--surface-variant)",
              "on-surface-variant": "var(--on-surface-variant)",
              primary: "var(--primary)",
              "on-primary": "var(--on-primary)",
              "primary-container": "var(--primary-container)",
              "on-primary-container": "var(--on-primary-container)",
              secondary: "var(--secondary)",
              tertiary: "var(--tertiary)",
              outline: "var(--outline)",
              "outline-variant": "var(--outline-variant)",
            },
            fontFamily: {
              headline: ["Manrope", "sans-serif"],
              body: ["Inter", "sans-serif"]
            }
          }
        }
      };
    </script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="bg-background text-on-background font-body">
    <main class="max-w-screen-xl mx-auto p-6 md:p-10">
      <section id="loginSection" class="max-w-md mx-auto mt-20 glass-card rounded-2xl p-6">
        <div class="flex items-center justify-between mb-4"><h1 data-i18n="title" class="font-headline text-3xl font-extrabold">Админ-панель</h1><div data-lang-switcher class="flex items-center"></div></div>
        <p class="text-on-surface-variant mb-4" data-i18n="loginDesc">Вход для управления сайтом.</p>
        <form id="loginForm" class="space-y-3">
          <input name="login" required placeholder="Логин" data-i18n="loginPlaceholder" class="w-full rounded-xl bg-surface border-outline" />
          <input name="password" type="password" required placeholder="Пароль" data-i18n="passwordPlaceholder" class="w-full rounded-xl bg-surface border-outline" />
          <button class="w-full rounded-xl py-2 bg-primary text-on-primary font-semibold" data-i18n="loginBtn">Войти</button>
        </form>
        <p class="text-xs text-on-surface-variant mt-3 text-center" data-i18n="loginCredHint">Введите ваши учетные данные доступа</p>
      </section>

      <section id="panelSection" class="hidden">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 mb-8">
          <h2 class="font-headline text-4xl font-extrabold" data-i18n="panelTitle">Управление контентом</h2>
          <div class="flex flex-wrap gap-3">
            <a href="./index.html" class="px-4 py-2 rounded-xl bg-surface-container-high transition-transform hover:scale-95" data-i18n="toSite">К сайту</a>
            <button id="exportDataBtn" class="px-4 py-2 rounded-xl bg-surface-container-high transition-transform hover:scale-95" data-i18n="exportJson">Экспорт JSON</button>
            <button id="resetDataBtn" class="px-4 py-2 rounded-xl bg-amber-500/20 text-amber-100 transition-transform hover:scale-95" data-i18n="resetData">Сброс демо-данных</button>
            <button id="logoutBtn" class="px-4 py-2 rounded-xl bg-red-500/20 text-red-200 transition-transform hover:scale-95" data-i18n="logoutBtn">Выйти</button>
          </div>
        </div>

        <div class="grid md:grid-cols-3 gap-4 mb-8">
          <div class="glass-card rounded-xl p-4">
            <p class="text-xs uppercase text-on-surface-variant" data-i18n="statsServices">Сервисов</p>
            <p id="statsServices" class="text-3xl font-headline font-extrabold">0</p>
          </div>
          <div class="glass-card rounded-xl p-4">
            <p class="text-xs uppercase text-on-surface-variant" data-i18n="statsNews">Новостей</p>
            <p id="statsNews" class="text-3xl font-headline font-extrabold">0</p>
          </div>
          <div class="glass-card rounded-xl p-4">
            <p class="text-xs uppercase text-on-surface-variant" data-i18n="statsRequests">Новых заявок</p>
            <p id="statsRequests" class="text-3xl font-headline font-extrabold">0</p>
          </div>
        </div>

        <div class="grid lg:grid-cols-2 gap-8">
          <article class="glass-card rounded-2xl p-6">
            <h3 class="font-headline text-2xl font-bold mb-4" data-i18n="sectionServices">Сервисы</h3>
            <form id="serviceForm" class="grid gap-3 mb-5">
              <input name="title" required placeholder="Название сервиса" data-i18n="serviceTitlePlaceholder" class="rounded-xl bg-surface border-outline" />
              <input name="tag" placeholder="Тег (например Invest)" data-i18n="serviceTagPlaceholder" class="rounded-xl bg-surface border-outline" />
              <textarea name="description" required placeholder="Описание" data-i18n="serviceDescPlaceholder" class="rounded-xl bg-surface border-outline"></textarea>
              <button class="rounded-xl py-2 bg-primary text-on-primary font-semibold" data-i18n="addServiceBtn">Добавить сервис</button>
            </form>
            <div id="adminServicesList" class="space-y-3"></div>
          </article>

          <article class="glass-card rounded-2xl p-6">
            <h3 class="font-headline text-2xl font-bold mb-4" data-i18n="sectionNews">Новости</h3>
            <form id="newsForm" class="grid gap-4 mb-5">

              <!-- Language tabs -->
              <div class="flex gap-1 p-1 rounded-xl bg-surface-variant/30 w-fit">
                <button type="button" data-lang-tab="ru" class="lang-tab active px-4 py-1.5 rounded-lg text-sm font-bold bg-primary text-on-primary transition-all">RU</button>
                <button type="button" data-lang-tab="uz" class="lang-tab px-4 py-1.5 rounded-lg text-sm font-bold text-on-surface-variant hover:text-on-surface transition-all">UZ</button>
                <button type="button" data-lang-tab="en" class="lang-tab px-4 py-1.5 rounded-lg text-sm font-bold text-on-surface-variant hover:text-on-surface transition-all">EN</button>
              </div>

              <!-- RU fields -->
              <div id="newsLangRu" class="news-lang-panel grid gap-3">
                <input name="title" required placeholder="Заголовок (RU) *" class="rounded-xl px-4 py-2 bg-surface border-outline" />
                <textarea name="content" required placeholder="Текст новости (RU) *" class="rounded-xl px-4 py-2 min-h-[80px] bg-surface border-outline"></textarea>
              </div>
              <!-- UZ fields -->
              <div id="newsLangUz" class="news-lang-panel hidden grid gap-3">
                <input name="title_uz" placeholder="Sarlavha (UZ)" class="rounded-xl px-4 py-2 bg-surface border-outline" />
                <textarea name="content_uz" placeholder="Yangilik matni (UZ)" class="rounded-xl px-4 py-2 min-h-[80px] bg-surface border-outline"></textarea>
              </div>
              <!-- EN fields -->
              <div id="newsLangEn" class="news-lang-panel hidden grid gap-3">
                <input name="title_en" placeholder="Title (EN)" class="rounded-xl px-4 py-2 bg-surface border-outline" />
                <textarea name="content_en" placeholder="News content (EN)" class="rounded-xl px-4 py-2 min-h-[80px] bg-surface border-outline"></textarea>
              </div>

              <!-- Image upload -->
              <div class="p-4 rounded-xl bg-surface-variant/20 border border-outline-variant/30 space-y-3">
                <div class="flex items-center gap-2 text-primary">
                  <span class="material-symbols-outlined text-sm">image</span>
                  <label class="text-xs font-bold uppercase tracking-widest leading-none" data-i18n="newsImageLabel">Фотография новости</label>
                </div>
                <input type="file" id="newsImage" name="image" accept="image/*" class="w-full text-sm text-on-surface-variant file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-bold file:bg-primary file:text-on-primary hover:file:opacity-90 cursor-pointer" />
                <p class="text-[10px] text-outline-variant italic" data-i18n="newsImageHint">Рекомендуемый размер до 1 МБ. Форматы: JPG, PNG, WebP.</p>
              </div>

              <button class="rounded-xl py-3 bg-primary text-on-primary font-bold hover:scale-[0.98] transition-all shadow-lg shadow-primary/20" data-i18n="publishNewsBtn">Опубликовать новость</button>
            </form>
            <div id="adminNewsList" class="space-y-3"></div>
          </article>
        </div>

        <article class="glass-card rounded-2xl p-6 mt-8">
          <h3 class="font-headline text-2xl font-bold mb-4" data-i18n="sectionRequests">Заявки с сайта</h3>
          <div id="adminRequestsList" class="space-y-3"></div>
        </article>
      </section>
    </main>
    <script src="./api.js"></script>
    <script src="./admin.js"></script>
      <script src="./i18n.js"></script>
    <script src="./shared-nav.js?v=4"></script>
</body>
</html>
